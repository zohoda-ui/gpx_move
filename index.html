<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPX Motion Animator & Video Generator</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- MapLibre GL JS CSS -->
  <link href="https://unpkg.com/maplibre-gl@^4/dist/maplibre-gl.css" rel="stylesheet" />
  <!-- Custom Styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <!-- Map Container (Will hold the WebGL canvas) -->
    <div id="map-viewport">
      <div id="map"></div>
      
      <!-- Elevation Profile Glass Panel Overlay -->
      <div id="elevation-panel" class="elevation-panel glass hidden">
        <div class="elevation-header">
          <div class="elevation-title-group">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="title-icon">
              <path d="M3 17l6-6 4 4 8-8"></path>
              <polyline points="14 7 20 7 20 13"></polyline>
            </svg>
            <span class="elevation-title">고도 프로필</span>
          </div>
          <div class="elevation-stats">
            <span class="stat-item">최대: <strong id="max-ele">--</strong>m</span>
            <span class="stat-item">최저: <strong id="min-ele">--</strong>m</span>
            <span class="stat-item">현재: <strong id="current-ele" class="highlight">--</strong>m</span>
            <span class="stat-item">누적↑: <strong id="total-ascent" class="highlight-green">--</strong>m</span>
            <span class="stat-item">거리: <strong id="current-dist" class="highlight">--</strong>/<strong id="total-dist">--</strong>km</span>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="elevation-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- UI Overlay Panels -->
    <header class="main-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <h1>GPX Motion Studio</h1>
      </div>
      <p class="subtitle">GPX 경로를 시네마틱 3D 비디오로 변환하세요</p>
    </header>

    <!-- Sidebar Control Panel -->
    <main class="control-panel glass">
      <!-- Section 1: GPX Upload -->
      <section class="panel-section" id="upload-section">
        <div class="section-header">
          <span class="step-badge">1</span>
          <h2>GPX 파일 업로드</h2>
        </div>
        <div id="drop-zone" class="drop-zone">
          <input type="file" id="file-input" accept=".gpx" class="file-input" />
          <div class="drop-zone-content">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p class="drop-text">GPX 파일을 드래그하여 놓거나</p>
            <button type="button" class="btn btn-secondary btn-sm" id="browse-btn">파일 찾아보기</button>
          </div>
        </div>
        <!-- Demo Button -->
        <div class="demo-trigger-wrapper" style="margin-top: 12px; text-align: center;">
          <button type="button" class="btn btn-secondary btn-sm" id="load-demo-btn" style="width: 100%; border-color: rgba(0, 243, 255, 0.3); color: var(--accent-cyan); background: rgba(0, 243, 255, 0.03);">
            서울 남산 샘플 코스 불러오기 (데모)
          </button>
        </div>
        <div id="file-info" class="file-info hidden">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="info-icon">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
          <div class="file-meta">
            <span class="file-name" id="info-filename">route.gpx</span>
            <span class="file-details" id="info-details">거리: -- km | 포인트: --개</span>
          </div>
          <button type="button" class="btn-icon" id="remove-file-btn" title="파일 삭제">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </section>

      <!-- Section 2: Animation & Video Settings -->
      <section class="panel-section disabled" id="settings-section">
        <div class="section-header">
          <span class="step-badge">2</span>
          <h2>애니메이션 & 비디오 설정</h2>
        </div>

        <div class="settings-grid">
          <!-- Camera Mode Selection -->
          <div class="setting-group">
            <label class="setting-label">카메라 연출 모드</label>
            <div class="radio-tiles">
              <label class="radio-tile">
                <input type="radio" name="camera-mode" value="chase-rot" checked />
                <span class="tile-content">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                  </svg>
                  <span style="font-size: 0.75rem;">추격 (회전 3D)</span>
                </span>
              </label>
              <label class="radio-tile">
                <input type="radio" name="camera-mode" value="chase-fixed" />
                <span class="tile-content">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                  </svg>
                  <span style="font-size: 0.75rem;">추격 (고정 3D)</span>
                </span>
              </label>
              <label class="radio-tile" style="grid-column: span 2;">
                <input type="radio" name="camera-mode" value="overview" />
                <span class="tile-content" style="flex-direction: row; gap: 8px; justify-content: center; padding: 10px;">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                  </svg>
                  <span>항공 뷰 (2D)</span>
                </span>
              </label>
            </div>
          </div>

          <!-- Video Duration -->
          <div class="setting-group">
            <label for="duration-input" class="setting-label">비디오 재생 시간</label>
            <div class="range-container">
              <input type="range" id="duration-input" min="5" max="15" value="10" step="1" />
              <span class="range-value" id="duration-value">10초</span>
            </div>
          </div>

          <!-- Video Resolution -->
          <div class="setting-group">
            <label for="resolution-select" class="setting-label">비디오 비율 & 해상도</label>
            <select id="resolution-select" class="form-select">
              <option value="1920x1080">가로형 16:9 (1920x1080)</option>
              <option value="1080x1920" selected>세로형 9:16 (1080x1920) - 숏폼용</option>
              <option value="1080x1080">정사각형 1:1 (1080x1080)</option>
              <option value="1280x720">가로형 16:9 (1280x720)</option>
            </select>
          </div>

          <!-- Line Style & Color -->
          <div class="setting-group">
            <label class="setting-label">경로 선 커스텀</label>
            <div class="line-style-options">
              <!-- Color Selector -->
              <div class="color-picker-wrapper">
                <span class="sub-label">색상</span>
                <div class="color-options">
                  <button type="button" class="color-dot active" data-color="#00f3ff" style="background-color: #00f3ff;" title="Cyan"></button>
                  <button type="button" class="color-dot" data-color="#39ff14" style="background-color: #39ff14;" title="Neon Green"></button>
                  <button type="button" class="color-dot" data-color="#ff007f" style="background-color: #ff007f;" title="Hot Pink"></button>
                  <button type="button" class="color-dot" data-color="#ffb700" style="background-color: #ffb700;" title="Neon Gold"></button>
                </div>
              </div>
              <!-- Thickness Selector -->
              <div class="thickness-wrapper">
                <span class="sub-label">두께</span>
                <select id="line-width-select" class="form-select select-sm">
                  <option value="3">얇게 (3px)</option>
                  <option value="5" selected>보통 (5px)</option>
                  <option value="8">두껍게 (8px)</option>
                  <option value="12">매우 두껍게 (12px)</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Map Style -->
          <div class="setting-group">
            <label for="map-style-select" class="setting-label">지도 스타일 테마</label>
            <select id="map-style-select" class="form-select">
              <option value="dark" selected>시네마틱 다크 (Dark Matter)</option>
              <option value="light">모던 라이트 (Positron)</option>
              <option value="voyager">컬러 트래블 (Voyager)</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Section 3: Action Controls -->
      <section class="panel-section disabled" id="action-section">
        <div class="action-buttons">
          <button type="button" class="btn btn-secondary" id="preview-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span>경로 미리보기</span>
          </button>
          <button type="button" class="btn btn-primary" id="record-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3" fill="currentColor"></circle>
            </svg>
            <span>비디오 파일 생성</span>
          </button>
        </div>
      </section>
    </main>

    <!-- Rendering overlay indicator -->
    <div id="rendering-overlay" class="rendering-overlay hidden">
      <div class="rendering-box glass">
        <div class="spinner"></div>
        <h3>비디오 동영상 제작 중...</h3>
        <p class="rendering-message">지도를 가리거나 크기를 조절하지 마세요.</p>
        <div class="progress-bar-container">
          <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <div class="progress-percentage"><span id="progress-text">0</span>% 완료</div>
        <button type="button" class="btn btn-danger btn-sm" id="cancel-record-btn">취소</button>
      </div>
    </div>
  </div>

  <!-- MapLibre GL JS Script -->
  <script src="https://unpkg.com/maplibre-gl@^4/dist/maplibre-gl.js"></script>
  <!-- mp4-muxer UMD Library for MP4 encoding in browser -->
  <script src="https://cdn.jsdelivr.net/npm/mp4-muxer@4.1.0/build/mp4-muxer.umd.js"></script>
  <!-- Custom Logic -->
  <script src="app.js"></script>
</body>
</html>
